<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker PWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #3182ce;
            --success: #38a169;
            --danger: #e53e3e;
            --bg: #f7fafc;
            --card-bg: #ffffff;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); padding: 10px; margin: 0; }
        .container { max-width: 1100px; margin: auto; background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        h2 { text-align: center; color: #2d3748; margin-bottom: 20px; }

        /* Table Styling */
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        th { display: none; } /* Hidden on mobile by default */
        td { background: #fff; padding: 12px; border: 1px solid #edf2f7; }

        /* Mobile Card Layout */
        @media (max-width: 768px) {
            tr { 
                display: flex; 
                flex-direction: column; 
                margin-bottom: 20px; 
                border: 1px solid #e2e8f0; 
                border-radius: 8px; 
                padding: 10px;
                background: white;
                position: relative;
            }
            td { display: flex; justify-content: space-between; align-items: center; border: none; padding: 8px 5px; }
            td::before { content: attr(data-label); font-weight: bold; color: #718096; font-size: 0.85em; }
            
            /* Specific adjustments for mobile inputs */
            input { width: 60% !important; }
            .progress-container-cell { flex-direction: column; align-items: flex-start; }
            .progress-container-cell::before { margin-bottom: 5px; }
            .progress-bg { width: 100% !important; }
        }

        /* Desktop Headers View */
        @media (min-width: 769px) {
            th { display: table-cell; background: #4a5568; color: white; padding: 12px; text-align: left; }
            td { display: table-cell; border-top: 1px solid #edf2f7; border-bottom: 1px solid #edf2f7; }
            input { width: 100%; }
        }

        /* Responsive Overdue Highlight */
        tr.overdue-row { background-color: #fff5f5 !important; border-left: 5px solid var(--danger) !important; }

        /* UI Elements */
        input { padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 16px; /* Prevents auto-zoom on iOS */ }
        .num-input { width: 80px; text-align: center; }
        .progress-bg { width: 100%; background: #e2e8f0; border-radius: 10px; height: 12px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s ease; }
        .percent-text { font-weight: bold; font-size: 0.9em; }

        .btn { padding: 12px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .btn-add { background: var(--success); color: white; width: 100%; margin-bottom: 15px; }
        .btn-plus { background: var(--primary); color: white; flex-grow: 1; }
        .btn-del { background: #fee2e2; color: var(--danger); font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Task Tracker</h2>
    <button class="btn btn-add" onclick="addNewRow()">+ Add New Task</button>

    <table id="taskTable">
        <thead>
            <tr>
                <th>Task</th>
                <th>Target Date</th>
                <th>Done</th>
                <th>Goal</th>
                <th>Progress</th>
                <th>Quick Add</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('tasks')) || [];
        if (saved.length === 0) {
            for(let i=0; i<3; i++) addNewRow();
        } else {
            saved.forEach(data => addNewRow(data));
        }
    };

    function addNewRow(data = null) {
        const tbody = document.getElementById('tableBody');
        const row = document.createElement('tr');
        const today = new Date().toISOString().split('T')[0];

        row.innerHTML = `
            <td data-label="Task"><input type="text" class="task-name" value="${data ? data.name : 'New Task'}" oninput="saveAll()"></td>
            <td data-label="Deadline"><input type="date" class="date-input" value="${data ? data.date : today}" oninput="saveAll()"></td>
            <td data-label="Completed"><input type="number" class="num-input comp-val" value="${data ? data.comp : 0}" oninput="saveAll()"></td>
            <td data-label="Target"><input type="number" class="num-input target-val" value="${data ? data.target : 100}" oninput="saveAll()"></td>
            <td data-label="Progress" class="progress-container-cell">
                <span class="percent-text">0%</span>
                <div class="progress-bg"><div class="progress-fill"></div></div>
            </td>
            <td data-label="Quick Add">
                <div style="display:flex; gap:8px; width: 100%;">
                    <input type="number" class="num-input increment-val" value="10" style="width:60px">
                    <button class="btn btn-plus" onclick="quickAdd(this)">+</button>
                </div>
            </td>
            <td><button class="btn btn-del" onclick="removeRow(this)">Delete Task</button></td>
        `;
        tbody.appendChild(row);
        calculate(row.querySelector('.comp-val'));
    }

    function calculate(element) {
        const row = element.closest('tr');
        const comp = parseFloat(row.querySelector('.comp-val').value) || 0;
        const target = parseFloat(row.querySelector('.target-val').value) || 1;
        const dateVal = row.querySelector('.date-input').value;
        
        let pct = Math.min(Math.round((comp / target) * 100), 100);
        row.querySelector('.progress-fill').style.width = pct + '%';
        row.querySelector('.percent-text').innerText = pct + '%';
        
        const isOverdue = new Date(dateVal) < new Date().setHours(0,0,0,0) && pct < 100;
        row.className = isOverdue ? 'overdue-row' : '';
        row.querySelector('.progress-fill').style.background = (pct >= 100) ? '#38a169' : '#3182ce';
    }

    function quickAdd(btn) {
        const row = btn.closest('tr');
        const compInp = row.querySelector('.comp-val');
        compInp.value = (parseFloat(compInp.value) || 0) + (parseFloat(row.querySelector('.increment-val').value) || 0);
        saveAll();
    }

    function removeRow(btn) {
        if(confirm("Delete this task?")) {
            btn.closest('tr').remove();
            saveAll();
        }
    }

    function saveAll() {
        const tasks = [];
        document.querySelectorAll('#tableBody tr').forEach(row => {
            tasks.push({
                name: row.querySelector('.task-name').value,
                date: row.querySelector('.date-input').value,
                comp: row.querySelector('.comp-val').value,
                target: row.querySelector('.target-val').value
            });
            calculate(row.querySelector('.comp-val'));
        });
        localStorage.setItem('tasks', JSON.stringify(tasks));
    }
</script>
</body>
</html>
